name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  node-tests:
    name: Node Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Pack tarball
        run: npm pack --json > pack.json

      - name: Smoke install packaged CLI
        run: |
          PACK_FILE=$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('pack.json','utf8')); process.stdout.write(data[0].filename)")
          mkdir -p /tmp/agentinbox-smoke
          cd /tmp/agentinbox-smoke
          npm init -y
          npm install "$GITHUB_WORKSPACE/$PACK_FILE"
          npx agentinbox --version
          npx agentinbox --help
