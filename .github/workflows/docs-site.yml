name: Docs Site

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - 'package.json'
      - 'package-lock.json'
      - 'wrangler.jsonc'
      - '.github/workflows/docs-site.yml'
  workflow_dispatch:

env:
  NODE_VERSION: 22

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and Deploy Docs Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build directory indexes
        run: npm run docs:index

      - name: Build Cloudflare bundle
        run: npm run docs:build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site-cloudflare
          path: dist/cloudflare

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 deploy --config wrangler.jsonc
